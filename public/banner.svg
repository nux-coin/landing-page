  <circle cx="350" cy="30" r="2" fill="#f0d060" opacity="0.5"/>
  <circle cx="500" cy="60" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="680" cy="25" r="2" fill="#f0d060" opacity="0.6"/>
  <circle cx="900" cy="50" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="1050" cy="35" r="2" fill="#f0d060" opacity="0.5"/>
  <circle cx="1200" cy="70" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="1380" cy="40" r="2" fill="#f0d060" opacity="0.6"/>
  <circle cx="1460" cy="90" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="60" cy="200" r="1.5" fill="#f0d060" opacity="0.4"/>
  <circle cx="140" cy="380" r="2" fill="#ffffff" opacity="0.3"/>
  <circle cx="280" cy="440" r="1.5" fill="#f0d060" opacity="0.5"/>
  <circle cx="1300" cy="420" r="2" fill="#f0d060" opacity="0.6"/>
  <circle cx="1420" cy="380" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="1480" cy="300" r="2" fill="#f0d060" opacity="0.5"/>
  <circle cx="55" cy="460" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="420" cy="470" r="2" fill="#f0d060" opacity="0.4"/>
  <circle cx="1100" cy="460" r="1.5" fill="#ffffff" opacity="0.3"/>

