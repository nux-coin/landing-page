  <polygon points="1310,100 1360,71 1410,100 1410,158 1360,187 1310,158" fill="none" stroke="#2a2a5a" stroke-width="1.2"/>
  <polygon points="1380,260 1420,237 1460,260 1460,306 1420,329 1380,306" fill="none" stroke="#1e1e4a" stroke-width="0.8"/>
  <polygon points="1280,370 1310,353 1340,370 1340,404 1310,421 1280,404" fill="none" stroke="#2a2a5a" stroke-width="0.8"/>
  <polygon points="1200,50 1230,33 1260,50 1260,84 1230,101 1200,84" fill="none" stroke="#1e1e4a" stroke-width="0.6"/>

  <!-- Mid hex decorations -->
  <polygon points="480,380 510,363 540,380 540,414 510,431 480,414" fill="none" stroke="#1e1e4a" stroke-width="0.6"/>
  <polygon points="960,380 990,363 1020,380 1020,414 990,431 960,414" fill="none" stroke="#1e1e4a" stroke-width="0.6"/>

  <!-- Gold accent bars -->
  <rect x="0" y="0" width="1500" height="4" fill="#c8942a"/>
  <rect x="0" y="496" width="1500" height="4" fill="#c8942a"/>

