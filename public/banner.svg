  <rect x="0" y="0" width="4" height="500" fill="#c8942a" opacity="0.4"/>
  <rect x="1496" y="0" width="4" height="500" fill="#c8942a" opacity="0.4"/>

  <!-- Coin glow -->
  <circle cx="750" cy="250" r="230" fill="#c8a84b" opacity="0.05"/>
  <circle cx="750" cy="250" r="190" fill="#c8a84b" opacity="0.06"/>

