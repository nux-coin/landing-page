  <circle cx="750" cy="250" r="175" fill="#e8c55a"/>
  <circle cx="750" cy="250" r="163" fill="#d4a832"/>
  <circle cx="750" cy="250" r="152" fill="#f0d060"/>

  <!-- Inner rings -->
  <circle cx="750" cy="250" r="142" fill="none" stroke="#c8942a" stroke-width="2"/>
  <circle cx="750" cy="250" r="130" fill="none" stroke="#c8942a" stroke-width="0.8"/>

  <!-- Hexagon on coin -->
  <polygon points="750,128 854,188 854,312 750,372 646,312 646,188" fill="#e8c040" stroke="#c8942a" stroke-width="1.2"/>

  <!-- NUX on coin -->
  <text x="698" y="284" font-family="Arial, sans-serif" font-size="82" font-weight="700" fill="#8a6010" text-anchor="middle">N</text>
  <text x="750" y="284" font-family="Arial, sans-serif" font-size="82" font-weight="700" fill="#7a5008" text-anchor="middle">U</text>
  <text x="802" y="284" font-family="Arial, sans-serif" font-size="82" font-weight="700" fill="#8a6010" text-anchor="middle">X</text>

  <!-- QUANTUM on coin -->
  <text x="750" y="172" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#9a7020" text-anchor="middle" letter-spacing="5">QUANTUM</text>

  <!-- Coin dots bottom -->
  <circle cx="728" cy="338" r="3" fill="#c8942a"/>
  <circle cx="750" cy="344" r="3" fill="#c8942a"/>
  <circle cx="772" cy="338" r="3" fill="#c8942a"/>

  <!-- Left side text -->
  <text x="160" y="210" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="#f0d060" letter-spacing="2">NUX</text>
  <text x="160" y="288" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="#f0d060" letter-spacing="2">COIN</text>
  <rect x="160" y="304" width="200" height="3" fill="#c8942a"/>
  <text x="160" y="338" font-family="Arial, sans-serif" font-size="18" font-weight="400" fill="#a09060" letter-spacing="4">QUANTUM FINANCE</text>

  <!-- Right side text -->
  <text x="1340" y="210" font-family="Arial, sans-serif" font-size="18" font-weight="400" fill="#706040" text-anchor="end" letter-spacing="2">DECENTRALIZED</text>
  <text x="1340" y="240" font-family="Arial, sans-serif" font-size="18" font-weight="400" fill="#706040" text-anchor="end" letter-spacing="2">AUTONOMOUS</text>
  <text x="1340" y="270" font-family="Arial, sans-serif" font-size="18" font-weight="400" fill="#706040" text-anchor="end" letter-spacing="2">ORGANIZATION</text>
  <rect x="1160" y="284" width="180" height="1.5" fill="#2a2a5a"/>
  <text x="1340" y="316" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#504838" text-anchor="end" letter-spacing="2">@nuxcoin</text>

  <!-- Bottom center tagline -->
  <text x="750" y="472" font-family="Arial, sans-serif" font-size="15" font-weight="400" fill="#403828" text-anchor="middle" letter-spacing="6">THE FUTURE OF QUANTUM FINANCE</text>

  <!-- Corner marks top-left -->
  <path d="M20,20 L60,20 L60,24 L24,24 L24,60 L20,60 Z" fill="#c8942a" opacity="0.7"/>
  <!-- Corner marks top-right -->
  <path d="M1480,20 L1440,20 L1440,24 L1476,24 L1476,60 L1480,60 Z" fill="#c8942a" opacity="0.7"/>
  <!-- Corner marks bottom-left -->
  <path d="M20,480 L60,480 L60,476 L24,476 L24,440 L20,440 Z" fill="#c8942a" opacity="0.7"/>
  <!-- Corner marks bottom-right -->
  <path d="M1480,480 L1440,480 L1440,476 L1476,476 L1476,440 L1480,440 Z" fill="#c8942a" opacity="0.7"/>

</svg>
