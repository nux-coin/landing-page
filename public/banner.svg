  <polygon points="80,140 120,117 160,140 160,186 120,209 80,186" fill="none" stroke="#2a2a5a" stroke-width="1.2"/>
  <polygon points="30,260 65,241 100,260 100,298 65,317 30,298" fill="none" stroke="#1e1e4a" stroke-width="0.8"/>
  <polygon points="110,350 140,333 170,350 170,384 140,401 110,384" fill="none" stroke="#2a2a5a" stroke-width="0.8"/>
  <polygon points="200,60 230,43 260,60 260,94 230,111 200,94" fill="none" stroke="#1e1e4a" stroke-width="0.6"/>

